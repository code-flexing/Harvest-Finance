<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline</title>
    <style>
      :root {
        --brand: #2f7a42;
        --bg: #f4f8f0;
        --text: #0b1b0f;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica,
          Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 520px;
        background: white;
        border: 1px solid rgba(47, 122, 66, 0.18);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 20px;
      }
      p {
        margin: 0 0 16px;
        opacity: 0.85;
        line-height: 1.5;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid rgba(47, 122, 66, 0.3);
        background: var(--brand);
        color: #fff;
        text-decoration: none;
        font-weight: 700;
      }
      .muted {
        font-size: 12px;
        opacity: 0.7;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card" role="main">
        <h1>You’re offline</h1>
        <p>
          Harvest Finance can’t reach the server right now. You can still view
          cached content (like your last viewed vault list) and queue actions
          that will sync automatically when you’re back online.
        </p>
        <a class="btn" href="/dashboard">Go to Dashboard</a>
        <div class="muted">Tip: enable mobile data or Wi‑Fi to refresh.</div>
      </div>
    </div>
  </body>
</html>
